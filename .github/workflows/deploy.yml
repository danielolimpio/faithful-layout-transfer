name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build estático
        run: |
          echo "=== Iniciando build estático ==="
          
          # Roda o build:static (pode falhar no Nitro, mas gera os arquivos)
          npm run build:static || echo "⚠ Build completou com avisos"
          
          echo "=== Verificando arquivos gerados ==="
          
          # Verifica se .output/public foi gerado
          if [ -d ".output/public" ]; then
            echo "✓ Pasta .output/public encontrada"
            ls -la .output/public/ | head -20
            
            # Cria dist e copia os arquivos
            mkdir -p dist
            cp -r .output/public/* dist/
            
            echo "✓ Arquivos copiados para dist/"
          fi
          
          # Verifica se dist/index.html existe
          if [ -f "dist/index.html" ]; then
            echo "✅ SUCESSO: index.html gerado!"
            echo "=== Primeiras linhas do index.html ==="
            head -15 dist/index.html
            echo "=== Conteúdo da pasta dist (primeiros 20 arquivos) ==="
            ls -la
