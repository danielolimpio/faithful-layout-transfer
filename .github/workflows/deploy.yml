name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build estático (sem postbuild)
        run: |
          echo "=== Build estático direto com Vite ==="
          STATIC_EXPORT=true npx vite build
          
          echo "=== Verificando arquivos ==="
          if [ -d "dist" ]; then
            echo "✓ Pasta dist/ encontrada"
            ls -la dist/ | head -20
            
            if [ -f "dist/index.html" ]; then
              echo "✅ index.html encontrado!"
            else
              echo "❌ index.html NÃO encontrado!"
              exit 1
            fi
          else
            echo "❌ Pasta dist/ não encontrada!"
            exit 1
          fi

      - name: Deploy FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: true
