name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build (ignora erro do Nitro)
        run: |
          # Roda o build e ignora QUALQUER erro
          STATIC_EXPORT=true npm run build || true
          
          # O importante: verifica se os arquivos foram gerados
          echo "=== Verificando se dist/index.html existe ==="
          if [ -f "dist/index.html" ]; then
            echo "✅ SUCESSO! index.html existe!"
            echo "=== Tamanho do index.html ==="
            wc -l dist/index.html
            echo "=== Primeiras 10 linhas ==="
            head -10 dist/index.html
            echo "=== Total de arquivos em dist/ ==="
            find dist/ -type f | wc -l
            exit 0
          else
            echo "❌ dist/index.html NÃO existe"
            echo "=== Verificando .output/public ==="
            if [ -d ".output/public" ]; then
              echo "✓ .output/public existe, copiando..."
              mkdir -p dist
              cp -r .output/public/* dist/
              if [ -f "dist/index.html" ]; then
                echo "✅ Copiado com sucesso!"
                exit 0
              fi
            fi
            echo " Falha total - nenhum arquivo encontrado"
            exit 1
          fi

      - name: Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: true
