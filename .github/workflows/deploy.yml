name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build estático (ignora erro do Nitro)
        run: |
          # Tenta o build - mesmo que falhe no Nitro, os arquivos estáticos são gerados
          npm run build:static || true
          
          # Verifica se o index.html foi gerado
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Erro: dist/index.html não foi gerado!"
            exit 1
          fi
          
          echo "✅ Build estático concluído!"
          ls -la dist/

      - name: Deploy FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: true
